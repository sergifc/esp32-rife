[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = COM3

board_build.partitions = huge_app.csv

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/tasmota/LovyanGFX.git

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

extra_scripts =
    post:extra_scripts.py
